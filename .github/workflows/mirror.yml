name: Sync Main Branch Only

on:
  push:
    branches:
      - main

jobs:
  sync-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Push ONLY main branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git remote add mirror https://x-access-token:$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@github.com/revendh/empty.git

          git push mirror main --force
